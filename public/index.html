<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Správce 3D Modelů</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }
            .main-container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 40px;
                margin: 40px auto;
                max-width: 900px;
            }
            .upload-zone {
                border: 3px dashed #667eea;
                border-radius: 15px;
                padding: 30px;
                text-align: center;
                transition: all 0.3s;
                cursor: pointer;
            }
            .upload-zone:hover {
                border-color: #764ba2;
                background: #f8f9ff;
            }
            .upload-zone.dragover {
                background: #e8ecff;
                border-color: #764ba2;
            }
            .model-item {
                transition: all 0.2s;
            }
            .model-item:hover {
                background: #f8f9ff;
                transform: translateX(5px);
            }
            .header-gradient {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .badge-chunk {
                font-size: 0.7em;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <main class="main-container">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold header-gradient">
                    📦 3D Model Manager
                </h1>
                <p class="lead text-muted">
                    Optimalizace GLTF modelů pro klientský streaming
                </p>
            </div>

            <section class="card mb-5 shadow-sm border-0">
                <div
                    class="card-header bg-gradient text-white"
                    style="
                        background: linear-gradient(
                            135deg,
                            #667eea 0%,
                            #764ba2 100%
                        );
                    "
                >
                    <h2 class="h5 mb-0">
                        📤 Nahrát model (ZIP s GLTF + textury)
                    </h2>
                </div>
                <div class="card-body">
                    <div class="upload-zone" id="uploadZone">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="64"
                            height="64"
                            fill="currentColor"
                            class="bi bi-cloud-upload text-primary mb-3"
                            viewBox="0 0 16 16"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383"
                            />
                            <path
                                fill-rule="evenodd"
                                d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708z"
                            />
                        </svg>
                        <h5 class="mb-2">Přetáhněte ZIP soubor sem</h5>
                        <p class="text-muted mb-3">
                            nebo klikněte pro výběr souboru
                        </p>
                        <form id="uploadForm">
                            <input
                                class="form-control d-none"
                                type="file"
                                id="modelFile"
                                name="modelZip"
                                required
                                accept=".zip"
                            />
                            <div class="small text-muted">
                                Upload začne automaticky po výběru ZIP souboru.
                            </div>
                        </form>
                    </div>

                    <div
                        class="progress-container mt-4"
                        style="display: none"
                        id="progressContainer"
                    >
                        <div class="d-flex justify-content-between mb-2">
                            <span id="uploadFileName" class="text-muted"></span>
                            <span id="uploadProgress" class="text-muted"
                                >0%</span
                            >
                        </div>
                        <div class="progress" style="height: 25px">
                            <div
                                id="progressBar"
                                class="progress-bar progress-bar-striped progress-bar-animated"
                                role="progressbar"
                                style="width: 0%"
                            ></div>
                        </div>
                        <div
                            id="uploadStats"
                            class="mt-2 text-center text-muted small"
                        ></div>
                    </div>

                    <div id="uploadStatus" class="mt-3"></div>
                </div>
            </section>

            <section class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <div
                        class="d-flex justify-content-between align-items-center flex-wrap gap-2"
                    >
                        <h2 class="h5 mb-0">📚 Dostupné modely</h2>
                        <div class="d-flex gap-2">
                            <button
                                class="btn btn-sm btn-outline-primary"
                                onclick="fetchAndDisplayModels()"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    fill="currentColor"
                                    class="bi bi-arrow-clockwise"
                                    viewBox="0 0 16 16"
                                >
                                    <path
                                        fill-rule="evenodd"
                                        d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"
                                    />
                                    <path
                                        d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"
                                    />
                                </svg>
                                Obnovit
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <ul id="modelList" class="list-group">
                        <li class="list-group-item text-center">Načítání...</li>
                    </ul>
                </div>
            </section>
        </main>

        <script>
            // Elementy
            const modelListEl = document.getElementById("modelList");
            const uploadForm = document.getElementById("uploadForm");
            const modelFileInput = document.getElementById("modelFile");
            const uploadStatusEl = document.getElementById("uploadStatus");
            const uploadZone = document.getElementById("uploadZone");
            const progressContainer =
                document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");
            const uploadProgress = document.getElementById("uploadProgress");
            const uploadFileName = document.getElementById("uploadFileName");
            const uploadStats = document.getElementById("uploadStats");
            let uploadStatusPoller = null;

            // --- DRAG & DROP LOGIKA ---
            uploadZone.addEventListener("click", () => modelFileInput.click());
            uploadForm.addEventListener("click", (event) => {
                event.stopPropagation();
            });
            uploadZone.addEventListener("dragover", (e) => {
                e.preventDefault();
                uploadZone.classList.add("dragover");
            });
            uploadZone.addEventListener("dragleave", () => {
                uploadZone.classList.remove("dragover");
            });
            uploadZone.addEventListener("drop", (e) => {
                e.preventDefault();
                uploadZone.classList.remove("dragover");
                if (
                    e.dataTransfer.files.length > 0 &&
                    e.dataTransfer.files[0].name.endsWith(".zip")
                ) {
                    modelFileInput.files = e.dataTransfer.files;
                    uploadFileName.textContent = e.dataTransfer.files[0].name;
                    uploadSelectedFile();
                }
            });
            modelFileInput.addEventListener("change", (e) => {
                if (e.target.files.length > 0) {
                    uploadFileName.textContent = e.target.files[0].name;
                    uploadSelectedFile();
                }
            });

            async function readJsonResponse(response) {
                const text = await response.text();

                if (!text) {
                    throw new Error(
                        `Server vrátil prázdnou odpověď (${response.status}).`,
                    );
                }

                try {
                    return JSON.parse(text);
                } catch {
                    throw new Error(
                        `Server vrátil neplatný JSON (${response.status}).`,
                    );
                }
            }

            function renderUploadStatus(status) {
                if (!status) return;

                const lines = (status.logs || []).slice(-6).map((entry) => {
                    const time = new Date(entry.time).toLocaleTimeString(
                        "cs-CZ",
                    );
                    return `${time} • ${entry.message}`;
                });

                uploadStats.innerHTML = `
                    <div><strong>Fáze:</strong> ${status.phase || "-"}</div>
                    <div class="mt-1">${status.message || ""}</div>
                    ${
                        lines.length > 0
                            ? `<div class="mt-2 text-start" style="max-height: 140px; overflow: auto; white-space: pre-line;">${lines.join("\n")}</div>`
                            : ""
                    }
                `;
            }

            async function pollUploadStatus() {
                try {
                    const response = await fetch("/upload-status", {
                        cache: "no-store",
                    });
                    if (!response.ok) return;
                    const data = await readJsonResponse(response);
                    renderUploadStatus(data.status);
                } catch (error) {
                    console.error("Status poll failed", error);
                }
            }

            function startUploadStatusPolling() {
                stopUploadStatusPolling();
                pollUploadStatus();
                uploadStatusPoller = setInterval(pollUploadStatus, 1500);
            }

            function stopUploadStatusPolling() {
                if (uploadStatusPoller) {
                    clearInterval(uploadStatusPoller);
                    uploadStatusPoller = null;
                }
            }

            // --- NAČTENÍ MODELŮ ---
            async function fetchAndDisplayModels() {
                modelListEl.innerHTML = `
                    <li class="list-group-item text-center">
                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        Načítání...
                    </li>`;

                try {
                    const response = await fetch("/models");
                    if (!response.ok) throw new Error("Chyba serveru");
                    const data = await readJsonResponse(response);
                    const models = data.models || [];

                    modelListEl.innerHTML = "";

                    if (models.length === 0) {
                        modelListEl.innerHTML = `
                            <li class="list-group-item text-center text-muted p-4">
                                📦 Zatím zde nejsou žádné modely.
                            </li>`;
                        return;
                    }

                    models.forEach((model) => {
                        const li = document.createElement("li");
                        li.className =
                            "list-group-item model-item d-flex justify-content-between align-items-center";
                        const encodedModelName = encodeURIComponent(model.name);

                        // Info sekce
                        const infoDiv = document.createElement("div");
                        const nameSpan = document.createElement("div");
                        nameSpan.className = "fw-semibold";
                        nameSpan.textContent = model.name;

                        const badge = document.createElement("span");
                        badge.className =
                            "badge bg-info text-dark badge-chunk ms-2";
                        badge.title = `Entry file: ${model.entryFile}`;
                        badge.textContent = model.type?.toUpperCase() || "GLTF";
                        nameSpan.appendChild(document.createTextNode(" "));
                        nameSpan.appendChild(badge);

                        const sizeSpan = document.createElement("small");
                        sizeSpan.className = "text-muted";
                        const date = new Date(
                            model.modified,
                        ).toLocaleDateString("cs-CZ");
                        sizeSpan.textContent = `${model.sizeInMB} MB • ${date} • ${model.entryFile}`;

                        infoDiv.appendChild(nameSpan);
                        infoDiv.appendChild(sizeSpan);

                        // Akce
                        const actionsDiv = document.createElement("div");
                        actionsDiv.className = "d-flex gap-2";

                        const downloadBtn = document.createElement("a");
                        downloadBtn.href =
                            model.entryUrl ||
                            `/download-model/${encodedModelName}`;
                        downloadBtn.className = "btn btn-success btn-sm";
                        downloadBtn.innerHTML = "↗";
                        downloadBtn.target = "_blank";
                        downloadBtn.rel = "noopener noreferrer";
                        downloadBtn.title = "Otevřít entry GLTF";

                        const deleteBtn = document.createElement("button");
                        deleteBtn.className = "btn btn-outline-danger btn-sm";
                        deleteBtn.innerHTML = "🗑";
                        deleteBtn.title = "Smazat";
                        deleteBtn.onclick = () => deleteModel(model.name);

                        actionsDiv.appendChild(downloadBtn);
                        actionsDiv.appendChild(deleteBtn);

                        li.appendChild(infoDiv);
                        li.appendChild(actionsDiv);
                        modelListEl.appendChild(li);
                    });
                } catch (error) {
                    modelListEl.innerHTML = `<li class="list-group-item list-group-item-danger">Chyba: ${error.message}</li>`;
                }
            }

            // --- SMAZÁNÍ MODELU ---
            async function deleteModel(modelName) {
                if (!confirm(`Smazat model "${modelName}"?`)) return;
                try {
                    const response = await fetch(
                        `/model/${encodeURIComponent(modelName)}`,
                        { method: "DELETE" },
                    );
                    if (!response.ok) {
                        throw new Error("Mazání selhalo.");
                    }
                    fetchAndDisplayModels();
                } catch (error) {
                    alert("Chyba při mazání.");
                }
            }

            // --- UPLOAD HANDLER ---
            async function uploadSelectedFile() {
                const file = modelFileInput.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append("modelZip", file);

                progressContainer.style.display = "block";
                uploadStatusEl.innerHTML = "";
                progressBar.style.width = "0%";
                uploadProgress.textContent = "0%";
                uploadStats.textContent = "Čekám na zahájení uploadu...";
                startUploadStatusPolling();

                // Fake progress (protože fetch neumí nativně upload progress)
                let simulatedProgress = 0;
                const progressInterval = setInterval(() => {
                    if (simulatedProgress < 90) {
                        simulatedProgress += Math.random() * 15;
                        if (simulatedProgress > 90) simulatedProgress = 90;
                        progressBar.style.width = simulatedProgress + "%";
                        uploadProgress.textContent =
                            Math.floor(simulatedProgress) + "%";
                    }
                }, 400);

                try {
                    const response = await fetch("/upload-model", {
                        method: "POST",
                        body: formData,
                    });

                    clearInterval(progressInterval);
                    stopUploadStatusPolling();
                    progressBar.style.width = "100%";
                    uploadProgress.textContent = "100%";

                    const result = await readJsonResponse(response);

                    if (result.success) {
                        uploadStatusEl.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Model nahrán a připraven pro streaming!<br>
                            Velikost: <strong>${result.sizeInMB} MB</strong><br>
                            Entry: <strong>${result.metadata.entryFile}</strong><br>
                            LODs: <strong>${(result.metadata.lods || []).map((lod) => lod.name).join(", ")}</strong>
                        </div>`;
                        fetchAndDisplayModels();
                        setTimeout(
                            () => (progressContainer.style.display = "none"),
                            3000,
                        );
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    clearInterval(progressInterval);
                    stopUploadStatusPolling();
                    uploadStatusEl.innerHTML = `<div class="alert alert-danger">❌ Chyba: ${error.message}</div>`;
                }
                uploadForm.reset();
                uploadFileName.textContent = "";
            }

            uploadForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                await uploadSelectedFile();
            });

            // Start
            document.addEventListener(
                "DOMContentLoaded",
                fetchAndDisplayModels,
            );
        </script>
    </body>
</html>
