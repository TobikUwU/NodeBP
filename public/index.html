<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Správce 3D Modelů</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }
            .main-container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 40px;
                margin: 40px auto;
                max-width: 900px;
            }
            .upload-zone {
                border: 3px dashed #667eea;
                border-radius: 15px;
                padding: 30px;
                text-align: center;
                transition: all 0.3s;
                cursor: pointer;
            }
            .upload-zone:hover {
                border-color: #764ba2;
                background: #f8f9ff;
            }
            .upload-zone.dragover {
                background: #e8ecff;
                border-color: #764ba2;
            }
            .model-item {
                transition: all 0.2s;
            }
            .model-item:hover {
                background: #f8f9ff;
                transform: translateX(5px);
            }
            .header-gradient {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .badge-chunk {
                font-size: 0.7em;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <main class="main-container">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold header-gradient">
                    📦 3D Model Manager
                </h1>
                <p class="lead text-muted">
                    Optimalizace, komprese a chunking 3D modelů
                </p>
            </div>

            <section class="card mb-5 shadow-sm border-0">
                <div
                    class="card-header bg-gradient text-white"
                    style="
                        background: linear-gradient(
                            135deg,
                            #667eea 0%,
                            #764ba2 100%
                        );
                    "
                >
                    <h2 class="h5 mb-0">
                        📤 Nahrát model (ZIP s GLTF + textury)
                    </h2>
                </div>
                <div class="card-body">
                    <div class="upload-zone" id="uploadZone">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="64"
                            height="64"
                            fill="currentColor"
                            class="bi bi-cloud-upload text-primary mb-3"
                            viewBox="0 0 16 16"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383"
                            />
                            <path
                                fill-rule="evenodd"
                                d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708z"
                            />
                        </svg>
                        <h5 class="mb-2">Přetáhněte ZIP soubor sem</h5>
                        <p class="text-muted mb-3">
                            nebo klikněte pro výběr souboru
                        </p>
                        <form id="uploadForm">
                            <input
                                class="form-control d-none"
                                type="file"
                                id="modelFile"
                                name="modelZip"
                                required
                                accept=".zip"
                            />
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                            >
                                Nahrát a zpracovat
                            </button>
                        </form>
                    </div>

                    <div
                        class="progress-container mt-4"
                        style="display: none"
                        id="progressContainer"
                    >
                        <div class="d-flex justify-content-between mb-2">
                            <span id="uploadFileName" class="text-muted"></span>
                            <span id="uploadProgress" class="text-muted"
                                >0%</span
                            >
                        </div>
                        <div class="progress" style="height: 25px">
                            <div
                                id="progressBar"
                                class="progress-bar progress-bar-striped progress-bar-animated"
                                role="progressbar"
                                style="width: 0%"
                            ></div>
                        </div>
                        <div
                            id="uploadStats"
                            class="mt-2 text-center text-muted small"
                        ></div>
                    </div>

                    <div id="uploadStatus" class="mt-3"></div>
                </div>
            </section>

            <section class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <div
                        class="d-flex justify-content-between align-items-center flex-wrap gap-2"
                    >
                        <h2 class="h5 mb-0">📚 Dostupné modely</h2>
                        <div class="d-flex gap-2">
                            <button
                                class="btn btn-sm btn-outline-warning text-dark"
                                onclick="createAllChunks(this)"
                                title="Vytvoří chunky pro modely, které je nemají"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    fill="currentColor"
                                    class="bi bi-boxes"
                                    viewBox="0 0 16 16"
                                >
                                    <path
                                        d="M7.752.066a.5.5 0 0 1 .496 0l3.75 2.143a.5.5 0 0 1 .252.434v3.995l3.498 2A.5.5 0 0 1 16 9.07v4.286a.5.5 0 0 1-.252.434l-3.75 2.143a.5.5 0 0 1-.496 0l-3.502-2-3.502 2.001a.5.5 0 0 1-.496 0l-3.75-2.143A.5.5 0 0 1 0 13.357V9.071a.5.5 0 0 1 .252-.434L3.75 6.638V2.643a.5.5 0 0 1 .252-.434zM4.25 7.504 1.508 9.071l2.742 1.567 2.742-1.567zM7.5 9.933l-2.75 1.571v3.134l2.75-1.571zm1 3.134 2.75 1.571v-3.134L8.5 9.933zm.508-3.996 2.742 1.567 2.742-1.567-2.742-1.567zm2.242-2.433V3.504L8.5 5.076V8.21zM7.5 8.21V5.076L4.75 3.504v3.134zM5.258 2.643 8 4.21l2.742-1.567L8 1.076zM15 9.933l-2.75 1.571v3.134L15 13.067zM3.75 14.638v-3.134L1 9.933v3.134z"
                                    />
                                </svg>
                                Generovat chunky
                            </button>

                            <button
                                class="btn btn-sm btn-outline-primary"
                                onclick="fetchAndDisplayModels()"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    fill="currentColor"
                                    class="bi bi-arrow-clockwise"
                                    viewBox="0 0 16 16"
                                >
                                    <path
                                        fill-rule="evenodd"
                                        d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"
                                    />
                                    <path
                                        d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"
                                    />
                                </svg>
                                Obnovit
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <ul id="modelList" class="list-group">
                        <li class="list-group-item text-center">Načítání...</li>
                    </ul>
                </div>
            </section>
        </main>

        <script>
            // Elementy
            const modelListEl = document.getElementById("modelList");
            const uploadForm = document.getElementById("uploadForm");
            const modelFileInput = document.getElementById("modelFile");
            const uploadStatusEl = document.getElementById("uploadStatus");
            const uploadZone = document.getElementById("uploadZone");
            const progressContainer =
                document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");
            const uploadProgress = document.getElementById("uploadProgress");
            const uploadFileName = document.getElementById("uploadFileName");
            const uploadStats = document.getElementById("uploadStats");

            // --- DRAG & DROP LOGIKA ---
            uploadZone.addEventListener("click", () => modelFileInput.click());
            uploadZone.addEventListener("dragover", (e) => {
                e.preventDefault();
                uploadZone.classList.add("dragover");
            });
            uploadZone.addEventListener("dragleave", () => {
                uploadZone.classList.remove("dragover");
            });
            uploadZone.addEventListener("drop", (e) => {
                e.preventDefault();
                uploadZone.classList.remove("dragover");
                if (
                    e.dataTransfer.files.length > 0 &&
                    e.dataTransfer.files[0].name.endsWith(".zip")
                ) {
                    modelFileInput.files = e.dataTransfer.files;
                    uploadFileName.textContent = e.dataTransfer.files[0].name;
                }
            });
            modelFileInput.addEventListener("change", (e) => {
                if (e.target.files.length > 0) {
                    uploadFileName.textContent = e.target.files[0].name;
                }
            });

            // --- NAČTENÍ MODELŮ ---
            async function fetchAndDisplayModels() {
                modelListEl.innerHTML = `
                    <li class="list-group-item text-center">
                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        Načítání...
                    </li>`;

                try {
                    const response = await fetch("/models");
                    if (!response.ok) throw new Error("Chyba serveru");
                    const data = await response.json();
                    const models = data.models || [];

                    modelListEl.innerHTML = "";

                    if (models.length === 0) {
                        modelListEl.innerHTML = `
                            <li class="list-group-item text-center text-muted p-4">
                                📦 Zatím zde nejsou žádné modely.
                            </li>`;
                        return;
                    }

                    models.forEach((model) => {
                        const li = document.createElement("li");
                        li.className =
                            "list-group-item model-item d-flex justify-content-between align-items-center";
                        const encodedModelName = encodeURIComponent(model.name);

                        // Info sekce
                        const infoDiv = document.createElement("div");
                        const nameSpan = document.createElement("div");
                        nameSpan.className = "fw-semibold";
                        nameSpan.textContent = model.name;

                        // Pokud má model chunky, přidáme odznak
                        const badge = document.createElement("span");
                        badge.className = model.chunked
                            ? "badge bg-info text-dark badge-chunk ms-2"
                            : "badge bg-secondary badge-chunk ms-2";
                        if (model.chunked) {
                            badge.title = `${model.totalChunks} chunks`;
                            badge.textContent = `Chunked (${model.totalChunks})`;
                        } else {
                            badge.title = "Pouze jeden soubor";
                            badge.textContent = "Standard";
                        }
                        nameSpan.appendChild(document.createTextNode(" "));
                        nameSpan.appendChild(badge);

                        const sizeSpan = document.createElement("small");
                        sizeSpan.className = "text-muted";
                        const date = new Date(
                            model.modified,
                        ).toLocaleDateString("cs-CZ");
                        sizeSpan.textContent = `${model.sizeInMB} MB • ${date}`;

                        infoDiv.appendChild(nameSpan);
                        infoDiv.appendChild(sizeSpan);

                        // Akce
                        const actionsDiv = document.createElement("div");
                        actionsDiv.className = "d-flex gap-2";

                        const downloadBtn = document.createElement("a");
                        downloadBtn.href = `/download-model/${encodedModelName}`;
                        downloadBtn.className = "btn btn-success btn-sm";
                        downloadBtn.innerHTML = "⬇";
                        downloadBtn.title = "Stáhnout GLB";

                        const deleteBtn = document.createElement("button");
                        deleteBtn.className = "btn btn-outline-danger btn-sm";
                        deleteBtn.innerHTML = "🗑";
                        deleteBtn.title = "Smazat";
                        deleteBtn.onclick = () => deleteModel(model.name);

                        actionsDiv.appendChild(downloadBtn);
                        actionsDiv.appendChild(deleteBtn);

                        li.appendChild(infoDiv);
                        li.appendChild(actionsDiv);
                        modelListEl.appendChild(li);
                    });
                } catch (error) {
                    modelListEl.innerHTML = `<li class="list-group-item list-group-item-danger">Chyba: ${error.message}</li>`;
                }
            }

            // --- VYTVOŘENÍ VŠECH CHUNKŮ ---
            async function createAllChunks(btn) {
                if (
                    !confirm(
                        "Opravdu chcete vygenerovat chunky pro všechny modely, které je ještě nemají?",
                    )
                )
                    return;

                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML =
                    '<span class="spinner-border spinner-border-sm"></span> Pracuji...';

                try {
                    const res = await fetch("/create-all-chunks", {
                        method: "POST",
                    });
                    const data = await res.json();

                    if (data.success) {
                        const successCount = data.results.filter(
                            (r) => r.status === "success",
                        ).length;
                        const skippedCount = data.results.filter(
                            (r) => r.status === "skipped",
                        ).length;
                        const errorCount = data.results.filter(
                            (r) => r.status === "error",
                        ).length;

                        alert(
                            `Dokončeno!\n\n✅ Vytvořeno: ${successCount}\n⏭️ Přeskočeno (již existuje): ${skippedCount}\n❌ Chyby: ${errorCount}`,
                        );
                        fetchAndDisplayModels(); // Obnovit seznam pro zobrazení badge
                    } else {
                        alert("Chyba: " + data.message);
                    }
                } catch (e) {
                    alert("Chyba komunikace se serverem.");
                    console.error(e);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            }

            // --- SMAZÁNÍ MODELU ---
            async function deleteModel(modelName) {
                if (!confirm(`Smazat model "${modelName}"?`)) return;
                try {
                    const response = await fetch(
                        `/model/${encodeURIComponent(modelName)}`,
                        { method: "DELETE" },
                    );
                    if (!response.ok) {
                        throw new Error("Mazání selhalo.");
                    }
                    fetchAndDisplayModels();
                } catch (error) {
                    alert("Chyba při mazání.");
                }
            }

            // --- UPLOAD HANDLER ---
            uploadForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                const file = modelFileInput.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append("modelZip", file);

                progressContainer.style.display = "block";
                uploadStatusEl.innerHTML = "";
                progressBar.style.width = "0%";
                uploadProgress.textContent = "0%";

                // Fake progress (protože fetch neumí nativně upload progress)
                let simulatedProgress = 0;
                const progressInterval = setInterval(() => {
                    if (simulatedProgress < 90) {
                        simulatedProgress += Math.random() * 15;
                        if (simulatedProgress > 90) simulatedProgress = 90;
                        progressBar.style.width = simulatedProgress + "%";
                        uploadProgress.textContent =
                            Math.floor(simulatedProgress) + "%";
                    }
                }, 400);

                try {
                    const response = await fetch("/upload-model", {
                        method: "POST",
                        body: formData,
                    });

                    clearInterval(progressInterval);
                    progressBar.style.width = "100%";
                    uploadProgress.textContent = "100%";

                    const result = await response.json();

                    if (result.success) {
                        uploadStatusEl.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Model nahrán a zpracován!<br>
                            Velikost: <strong>${result.sizeInMB} MB</strong><br>
                            Chunky: <strong>${result.metadata.totalChunks}</strong>
                        </div>`;
                        fetchAndDisplayModels();
                        setTimeout(
                            () => (progressContainer.style.display = "none"),
                            3000,
                        );
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    clearInterval(progressInterval);
                    uploadStatusEl.innerHTML = `<div class="alert alert-danger">❌ Chyba: ${error.message}</div>`;
                }
                uploadForm.reset();
                uploadFileName.textContent = "";
            });

            // Start
            document.addEventListener(
                "DOMContentLoaded",
                fetchAndDisplayModels,
            );
        </script>
    </body>
</html>
